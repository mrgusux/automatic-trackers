title: "[Idea] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea for the **Ultimate Torrent Tracker Aggregator Pro Max**!
  - type: textarea
    id: idea-description
    attributes:
      label: 💡 Describe your idea
      description: A clear and concise description of what your idea or feature request is.
      placeholder: I think it would be great if the script could...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives you've considered
      description: A clear and concise description of any alternative solutions or tools you've considered.
      placeholder: Alternatively, we could...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 📝 Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
