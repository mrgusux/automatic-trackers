# PR Labeler rules (actions/labeler v5 syntax)
# Labels are applied automatically based on which files a PR touches.

documentation:
  - any:
    - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: 'CITATION.cff'
      - any-glob-to-any-file: 'LICENSE'

github-actions:
  - any:
    - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'
      - any-glob-to-any-file: '.github/dependabot.yml'

tracker-sources:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'config/**'

tracker-data:
  - any:
    - changed-files:
      - any-glob-to-any-file: '*.txt'
      - any-glob-to-any-file: 'api/**'
      - any-glob-to-any-file: '.tracker_hash'

scripts:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'scripts/**'
      - any-glob-to-any-file: 'Makefile'

tests:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'tests/**'

docker:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'Dockerfile'
      - any-glob-to-any-file: 'docker-compose.yml'
      - any-glob-to-any-file: '.dockerignore'

infrastructure:
  - any:
    - changed-files:
      - any-glob-to-any-file: '.editorconfig'
      - any-glob-to-any-file: '.gitignore'
      - any-glob-to-any-file: '.pre-commit-config.yaml'
