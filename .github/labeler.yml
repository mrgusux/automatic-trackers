# PR Labeler Rule Configuration (v5 syntax)

documentation:
  - any:
    - changed-files:
      - any-glob-to-any-file: '**/*.md'

github-actions:
  - any:
    - changed-files:
      - any-glob-to-any-file: '.github/workflows/*.yml'
      - any-glob-to-any-file: '.github/**/*.yml'

tracker-data:
  - any:
    - changed-files:
      - any-glob-to-any-file: '*.txt'
      - any-glob-to-any-file: '.tracker_hash'

scripts:
  - any:
    - changed-files:
      - any-glob-to-any-file: '**/*.sh'
      - any-glob-to-any-file: 'Makefile'
      - any-glob-to-any-file: 'Dockerfile'

infrastructure:
  - any:
    - changed-files:
      - any-glob-to-any-file: '.editorconfig'
      - any-glob-to-any-file: '.gitignore'
      - any-glob-to-any-file: '*.json'
