# PR Labeler rules (actions/labeler v5 syntax)
# Labels are applied automatically based on which files a PR touches.
# Used by: .github/workflows/pr-labeler.yml

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'
          - 'CITATION.cff'
          - 'LICENSE'

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'

tracker-sources:
  - changed-files:
      - any-glob-to-any-file:
          - 'config/**'
          - 'sources.txt'
          - 'SOURCES.md'
          - 'blacklist.txt'

tracker-data:
  - changed-files:
      - any-glob-to-any-file:
          - '*.txt'
          - 'api/**'
          - '.tracker_hash'

scripts:
  - changed-files:
      - any-glob-to-any-file:
          - 'scripts/**'
          - 'Makefile'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose.yml'
          - '.dockerignore'

security:
  - changed-files:
      - any-glob-to-any-file:
          - 'SECURITY.md'
          - '.github/workflows/scorecard.yml'
          - '.github/workflows/sign-artifacts.yml'
          - '.github/workflows/checksum.yml'
          - '.github/workflows/sbom.yml'
          - '.github/CODEOWNERS'

community:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/ISSUE_TEMPLATE/**'
          - '.github/DISCUSSION_TEMPLATE/**'
          - '.github/pull_request_template.md'
          - '.github/FUNDING.yml'
          - 'CODE_OF_CONDUCT.md'
          - 'CONTRIBUTING.md'
          - 'GOVERNANCE.md'
          - 'SUPPORT.md'
          - 'MAINTAINERS.md'

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - '.editorconfig'
          - '.gitignore'
          - '.pre-commit-config.yaml'
