name: 🧾 Generate SBOM

on:
  push:
    branches: [ "main" ]
  release:
    types: [published, created]
  workflow_dispatch:

# Only the newest SBOM run per branch matters
concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only. Write is granted only at the job level.
permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed only to attach the SBOM file to GitHub Releases
      contents: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🧾 Generate SBOM (Syft → CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: bom.cdx.json
          artifact-name: sbom-json
          # Automatically attach the SBOM to the release when this run
          # was triggered by a release event
          upload-release-assets: true
          upload-artifact: true

      - name: 🔎 Validate SBOM output
        run: |
          set -euo pipefail
          # Basic sanity check: the file must exist and be valid JSON
          test -s bom.cdx.json
          jq -e '.bomFormat == "CycloneDX"' bom.cdx.json > /dev/null
          echo "✅ SBOM generated and validated: $(jq -r '.specVersion' bom.cdx.json) (CycloneDX)"
