name: 🔐 Sign Tracker Assets

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Required for keyless signing with Sigstore

jobs:
  sign-assets:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: ✍️ Sign the trackers
        run: |
          # Create a signature for the main compiled tracker file
          cosign sign-blob --yes --output-signature all_trackers.sig all_trackers.txt
          echo "✅ Cryptographic signature generated successfully."

      - name: 💾 Upload Signature to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: all_trackers.sig
