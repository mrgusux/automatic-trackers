# ════════════════════════════════════════════════════════════════════
#  Ultimate Tracker Aggregator Pro Max — mrgusux
#  NOTE: The workflow `name:` below MUST stay "Update Trackers" because
#  discord-alert.yml monitors it by that exact name.
#
#  The aggregation engine lives in scripts/update_trackers.sh and the
#  source lists in config/sources.txt + config/blacklist_sources.txt.
#  This workflow is just a thin CI wrapper around that script.
# ════════════════════════════════════════════════════════════════════
name: Update Trackers

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_fetch:
        description: 'Force fetch from all sources (ignore cache fallback)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Never run two aggregations at once; never kill one halfway
concurrency:
  group: tracker-update
  cancel-in-progress: false

# Default read-only; write is granted only at the job level
permissions:
  contents: read

env:
  MIN_TRACKER_COUNT: 150
  DROP_GUARD_PERCENT: 60        # Abort if new list shrinks below 60% of previous
  TIMEOUT_SECONDS: 15
  CONNECT_TIMEOUT: 8
  MAX_PARALLEL_JOBS: 8
  RETRY_ATTEMPTS: 3
  CACHE_DIR: /tmp/tracker_cache

jobs:
  update-trackers:
    name: Aggregate & Process Trackers
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        # Full history so `git pull --rebase` works safely on push races
        fetch-depth: 0

    - name: Restore source fallback cache
      uses: actions/cache@v5
      with:
        path: /tmp/tracker_cache
        # A fresh key every run = the cache is always re-saved with new data;
        # restore-keys pulls the most recent previous run's copies.
        key: tracker-source-cache-${{ github.run_id }}
        restore-keys: |
          tracker-source-cache-

    - name: Run Tracker Aggregation Engine
      id: build
      env:
        DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
        FORCE_FETCH: ${{ github.event.inputs.force_fetch || 'false' }}
        # OUTPUT_DIR defaults to the repo root inside the script -
        # exactly where the committed lists live.
      run: bash scripts/update_trackers.sh

    - name: Commit & Push
      if: steps.build.outputs.skip_commit == 'false'
      env:
        TRACKER_COUNT: ${{ steps.build.outputs.tracker_count }}
        SOURCE_COUNT: ${{ steps.build.outputs.source_count }}
      run: |
        set -euo pipefail
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Explicit file list - never blindly `git add -A`
        git add all_trackers.txt all_trackers_comma.txt trackers.txt \
                udp.txt http.txt https.txt ws.txt \
                blacklist.txt SHA256SUMS.txt .tracker_hash \
                api/stats.json api/badge.json api/trackers.json

        if git diff --staged --quiet; then
          echo "ℹ Nothing staged - skipping commit."
          exit 0
        fi

        git commit -m "🔄 Update: ${TRACKER_COUNT} trackers from ${SOURCE_COUNT} sources [skip ci]"

        # Push with retry - errors are NEVER silently swallowed
        for attempt in 1 2 3; do
          if git push origin main; then
            echo "✅ Pushed successfully."
            exit 0
          fi
          echo "⚠ Push attempt $attempt failed - rebasing and retrying..."
          git pull --rebase origin main
          sleep 5
        done
        echo "::error::Failed to push after 3 attempts."
        exit 1

    - name: Complete
      if: always()
      run: echo "✓ Workflow complete"
