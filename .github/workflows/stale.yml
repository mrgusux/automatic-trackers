name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue is stale because it has been open for 30 days with no activity. Please leave a comment or remove the stale label, otherwise it will be closed in 7 days.'
          stale-pr-message: 'This PR is stale because it has been open for 30 days with no activity. Please leave a comment or remove the stale label, otherwise it will be closed in 7 days.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-stale: 30
          days-before-close: 7
