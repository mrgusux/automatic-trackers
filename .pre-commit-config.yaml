# =============================================================================
# pre-commit hooks - catch problems BEFORE they reach the repository.
# Setup (once):  pip install pre-commit && pre-commit install
# Manual run:    pre-commit run --all-files
# =============================================================================

# Generated/output files are bot-managed - no hook may ever touch them
exclude: >
  (?x)^(
    all_trackers\.txt|
    all_trackers_comma\.txt|
    trackers\.txt|
    udp\.txt|
    http\.txt|
    https\.txt|
    ws\.txt|
    blacklist\.txt|
    SHA256SUMS\.txt|
    \.tracker_hash|
    api/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Markdown uses two trailing spaces as hard line breaks
        args: ["--markdown-linebreak-ext=md"]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  # Shell linting - severity matches CI (lint.yml) so local = remote
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=style", "--external-sources"]

  # Workflow linting - catches YAML/expression/inline-bash errors in
  # .github/workflows/ before push (same tool as the actionlint CI job)
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
