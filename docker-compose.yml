version: '3.8'

services:
  automatic-trackers:
    build: .
    container_name: automatic-trackers
    restart: unless-stopped
    
    # Data persistence - volumes for output
    volumes:
      # Main output directory for generated tracker files
      - ./output:/app/output:rw
      # API endpoint outputs
      - ./api:/app/api:rw
      # Keep working files in app root too
      - ./:/app:rw
    
    # Environment configuration
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
      - SHELL=/bin/bash
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Health check - verify tracker list is valid
    healthcheck:
      test: ["CMD", "sh", "-c", "[ -f /app/all_trackers.txt ] && [ $(wc -l < /app/all_trackers.txt) -gt 200 ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Named volume for persistent data (optional)
volumes:
  tracker_output:
    driver: local
